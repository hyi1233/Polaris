<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- 渐变定义 -->
    <linearGradient id="bodyGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b35"/>
      <stop offset="50%" style="stop-color:#ff3366"/>
      <stop offset="100%" style="stop-color:#ff0080"/>
    </linearGradient>
    
    <linearGradient id="goggleGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ffff"/>
      <stop offset="50%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#00ffff"/>
    </linearGradient>
    
    <linearGradient id="tentacleGradient1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b35"/>
      <stop offset="100%" style="stop-color:#ff0080"/>
    </linearGradient>
    
    <linearGradient id="toolGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff88"/>
      <stop offset="100%" style="stop-color:#00d4ff"/>
    </linearGradient>
    
    <linearGradient id="toolGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700"/>
      <stop offset="100%" style="stop-color:#ff8c00"/>
    </linearGradient>
    
    <linearGradient id="toolGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff00ff"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    
    <!-- 发光效果 -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="strongGlow">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- 背景渐变 -->
    <radialGradient id="bgGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </radialGradient>
  </defs>
  
  <!-- 背景 -->
  <circle cx="256" cy="256" r="250" fill="url(#bgGradient)" stroke="#2d2d4a" stroke-width="4"/>
  
  <!-- 8条触手 (从头部伸出) -->
  <!-- 触手1 - 左上 (拿代码片段) -->
  <g transform="translate(100, 180)">
    <path d="M80,120 Q60,80 70,40 Q75,20 60,10" stroke="url(#tentacleGradient1)" stroke-width="18" fill="none" stroke-linecap="round"/>
    <!-- 代码片段工具 -->
    <g transform="translate(35, -25)">
      <rect x="0" y="0" width="35" height="28" rx="4" fill="url(#toolGradient1)" filter="url(#glow)"/>
      <line x1="5" y1="8" x2="25" y2="8" stroke="#0d1117" stroke-width="2"/>
      <line x1="5" y1="14" x2="20" y2="14" stroke="#0d1117" stroke-width="2"/>
      <line x1="5" y1="20" x2="15" y2="20" stroke="#0d1117" stroke-width="2"/>
    </g>
  </g>
  
  <!-- 触手2 - 右上 (拿终端窗口) -->
  <g transform="translate(280, 150)">
    <path d="M0,100 Q20,60 10,30 Q5,10 20,0" stroke="url(#tentacleGradient1)" stroke-width="18" fill="none" stroke-linecap="round"/>
    <!-- 终端窗口工具 -->
    <g transform="translate(5, -45)">
      <rect x="0" y="0" width="40" height="32" rx="4" fill="#1a1a2e" stroke="url(#toolGradient2)" stroke-width="2" filter="url(#glow)"/>
      <text x="6" y="12" fill="#00ff88" font-size="8" font-family="monospace">&gt;_</text>
      <line x1="6" y1="20" x2="30" y2="20" stroke="#00ff88" stroke-width="1" opacity="0.5"/>
      <line x1="6" y1="26" x2="20" y2="26" stroke="#ffd700" stroke-width="1" opacity="0.5"/>
    </g>
  </g>
  
  <!-- 触手3 - 左 (拿Git分支) -->
  <g transform="translate(60, 220)">
    <path d="M100,80 Q50,70 20,80 Q0,85 -10,70" stroke="url(#tentacleGradient1)" stroke-width="18" fill="none" stroke-linecap="round"/>
    <!-- Git分支工具 -->
    <g transform="translate(-55, 45)">
      <circle cx="10" cy="0" r="6" fill="url(#toolGradient2)" filter="url(#glow)"/>
      <circle cx="30" cy="0" r="6" fill="url(#toolGradient1)" filter="url(#glow)"/>
      <circle cx="20" cy="20" r="6" fill="url(#toolGradient3)" filter="url(#glow)"/>
      <line x1="10" y1="5" x2="20" y2="15" stroke="#fff" stroke-width="2"/>
      <line x1="30" y1="5" x2="20" y2="15" stroke="#fff" stroke-width="2"/>
    </g>
  </g>
  
  <!-- 触手4 - 右 (拿时钟) -->
  <g transform="translate(320, 200)">
    <path d="M0,80 Q50,70 80,80 Q100,85 110,70" stroke="url(#tentacleGradient1)" stroke-width="18" fill="none" stroke-linecap="round"/>
    <!-- 时钟工具 -->
    <g transform="translate(100, 45)">
      <circle cx="15" cy="15" r="18" fill="#1a1a2e" stroke="url(#toolGradient1)" stroke-width="3" filter="url(#glow)"/>
      <line x1="15" y1="15" x2="15" y2="6" stroke="#00ff88" stroke-width="2"/>
      <line x1="15" y1="15" x2="22" y2="15" stroke="#ffd700" stroke-width="2"/>
      <circle cx="15" cy="15" r="2" fill="#00ff88"/>
    </g>
  </g>
  
  <!-- 触手5 - 左下 (拿聊天气泡) -->
  <g transform="translate(100, 300)">
    <path d="M70,50 Q40,70 20,60 Q0,55 -15,65" stroke="url(#tentacleGradient1)" stroke-width="16" fill="none" stroke-linecap="round"/>
    <!-- 聊天气泡工具 -->
    <g transform="translate(-55, 50)">
      <path d="M5,0 L35,0 Q40,0 40,5 L40,20 Q40,25 35,25 L15,25 L10,32 L10,25 L5,25 Q0,25 0,20 L0,5 Q0,0 5,0 Z" fill="url(#toolGradient3)" filter="url(#glow)"/>
      <circle cx="12" cy="12" r="3" fill="#1a1a2e"/>
      <circle cx="22" cy="12" r="3" fill="#1a1a2e"/>
      <circle cx="32" cy="12" r="3" fill="#1a1a2e"/>
    </g>
  </g>
  
  <!-- 触手6 - 右下 (拿文件夹) -->
  <g transform="translate(280, 310)">
    <path d="M0,50 Q30,70 50,60 Q70,55 85,65" stroke="url(#tentacleGradient1)" stroke-width="16" fill="none" stroke-linecap="round"/>
    <!-- 文件夹工具 -->
    <g transform="translate(75, 45)">
      <path d="M0,5 L0,28 Q0,32 4,32 L36,32 Q40,32 40,28 L40,8 Q40,4 36,4 L18,4 L14,0 L4,0 Q0,0 0,4 Z" fill="url(#toolGradient2)" filter="url(#glow)"/>
      <line x1="8" y1="14" x2="32" y2="14" stroke="#1a1a2e" stroke-width="2"/>
    </g>
  </g>
  
  <!-- 触手7 - 左下角 (拿齿轮) -->
  <g transform="translate(130, 350)">
    <path d="M50,30 Q30,50 20,70 Q10,85 -5,95" stroke="url(#tentacleGradient1)" stroke-width="14" fill="none" stroke-linecap="round"/>
    <!-- 齿轮工具 -->
    <g transform="translate(-30, 80)">
      <circle cx="15" cy="15" r="10" fill="url(#toolGradient1)" filter="url(#glow)"/>
      <circle cx="15" cy="15" r="4" fill="#1a1a2e"/>
      <!-- 齿轮齿 -->
      <rect x="13" y="0" width="4" height="6" fill="url(#toolGradient1)" filter="url(#glow)"/>
      <rect x="13" y="24" width="4" height="6" fill="url(#toolGradient1)" filter="url(#glow)"/>
      <rect x="0" y="13" width="6" height="4" fill="url(#toolGradient1)" filter="url(#glow)"/>
      <rect x="24" y="13" width="6" height="4" fill="url(#toolGradient1)" filter="url(#glow)"/>
    </g>
  </g>
  
  <!-- 触手8 - 右下角 (拿闪电/AI) -->
  <g transform="translate(270, 340)">
    <path d="M0,30 Q20,50 35,70 Q50,85 65,95" stroke="url(#tentacleGradient1)" stroke-width="14" fill="none" stroke-linecap="round"/>
    <!-- 闪电工具 -->
    <g transform="translate(55, 75)">
      <polygon points="15,0 5,18 12,18 8,32 22,12 15,12 20,0" fill="url(#toolGradient3)" filter="url(#strongGlow)"/>
    </g>
  </g>
  
  <!-- 章鱼头部主体 -->
  <ellipse cx="256" cy="220" rx="90" ry="75" fill="url(#bodyGradient)"/>
  
  <!-- 头部高光 -->
  <ellipse cx="240" cy="185" rx="40" ry="25" fill="rgba(255,255,255,0.15)"/>
  
  <!-- 护目镜框 -->
  <path d="M170,210 Q180,195 220,195 Q260,195 280,195 Q320,195 340,210 Q350,230 340,250 Q320,265 280,265 Q260,265 220,265 Q180,265 170,250 Q160,230 170,210 Z" 
        fill="#1a1a2e" stroke="#2d2d4a" stroke-width="3"/>
  
  <!-- 左眼护目镜 -->
  <ellipse cx="210" cy="230" rx="32" ry="28" fill="url(#goggleGradient)" filter="url(#strongGlow)"/>
  <ellipse cx="210" cy="230" rx="20" ry="18" fill="#0d1117"/>
  <!-- 眼睛高光 -->
  <circle cx="220" cy="222" r="6" fill="rgba(255,255,255,0.8)"/>
  <circle cx="200" cy="235" r="3" fill="rgba(255,255,255,0.4)"/>
  
  <!-- 右眼护目镜 -->
  <ellipse cx="298" cy="230" rx="32" ry="28" fill="url(#goggleGradient)" filter="url(#strongGlow)"/>
  <ellipse cx="298" cy="230" rx="20" ry="18" fill="#0d1117"/>
  <!-- 眼睛高光 -->
  <circle cx="308" cy="222" r="6" fill="rgba(255,255,255,0.8)"/>
  <circle cx="288" cy="235" r="3" fill="rgba(255,255,255,0.4)"/>
  
  <!-- 嘴巴 - 得意的微笑 -->
  <path d="M230,275 Q256,290 282,275" stroke="#1a1a2e" stroke-width="4" fill="none" stroke-linecap="round"/>
  
  <!-- 头顶触角 -->
  <path d="M230,145 Q225,120 235,100 Q240,90 250,85" stroke="url(#bodyGradient)" stroke-width="12" fill="none" stroke-linecap="round"/>
  <circle cx="250" cy="82" r="8" fill="#ff0080" filter="url(#glow)"/>
  
  <path d="M282,145 Q287,120 277,100 Q272,90 262,85" stroke="url(#bodyGradient)" stroke-width="12" fill="none" stroke-linecap="round"/>
  <circle cx="262" cy="82" r="8" fill="#ff0080" filter="url(#glow)"/>
  
  <!-- 装饰性像素点 -->
  <rect x="180" y="160" width="4" height="4" fill="#00ff88" opacity="0.8"/>
  <rect x="320" y="165" width="4" height="4" fill="#ffd700" opacity="0.8"/>
  <rect x="340" y="200" width="4" height="4" fill="#ff00ff" opacity="0.6"/>
  <rect x="165" y="195" width="4" height="4" fill="#00ffff" opacity="0.6"/>
  
  <!-- 信号波纹效果 -->
  <circle cx="210" cy="230" r="40" fill="none" stroke="#00ffff" stroke-width="1" opacity="0.3"/>
  <circle cx="298" cy="230" r="40" fill="none" stroke="#00ffff" stroke-width="1" opacity="0.3"/>
</svg>