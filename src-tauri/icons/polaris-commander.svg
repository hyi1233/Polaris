<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- 渐变定义 -->
    <linearGradient id="robotBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="50%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    
    <linearGradient id="starEye" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700"/>
      <stop offset="50%" style="stop-color:#ffec8b"/>
      <stop offset="100%" style="stop-color:#ffd700"/>
    </linearGradient>
    
    <linearGradient id="headphoneGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff00ff"/>
      <stop offset="50%" style="stop-color:#ff69b4"/>
      <stop offset="100%" style="stop-color:#ff00ff"/>
    </linearGradient>
    
    <!-- 发光效果 -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="strongGlow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="starGlow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- 背景渐变 -->
    <radialGradient id="bgGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="70%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#050508"/>
    </radialGradient>
  </defs>
  
  <!-- 背景 -->
  <circle cx="256" cy="256" r="250" fill="url(#bgGradient)" stroke="#2d2d4a" stroke-width="3"/>
  
  <!-- 星星装饰背景 -->
  <circle cx="80" cy="100" r="2" fill="#ffd700" opacity="0.6"/>
  <circle cx="420" cy="80" r="2" fill="#00d4ff" opacity="0.5"/>
  <circle cx="450" cy="180" r="1.5" fill="#ff00ff" opacity="0.4"/>
  <circle cx="60" cy="200" r="1.5" fill="#ffd700" opacity="0.4"/>
  <circle cx="100" cy="400" r="2" fill="#00ffff" opacity="0.5"/>
  <circle cx="400" cy="420" r="1.5" fill="#ffd700" opacity="0.4"/>
  <circle cx="150" cy="80" r="1" fill="#ffffff" opacity="0.3"/>
  <circle cx="350" cy="450" r="1" fill="#ffffff" opacity="0.3"/>
  
  <!-- 耳机头带 -->
  <path d="M130,180 Q130,100 256,80 Q382,100 382,180" 
        stroke="url(#headphoneGradient)" stroke-width="16" fill="none" stroke-linecap="round" filter="url(#glow)"/>
  
  <!-- 左耳机 -->
  <ellipse cx="120" cy="210" rx="45" ry="55" fill="#1a1a2e" stroke="url(#headphoneGradient)" stroke-width="4" filter="url(#glow)"/>
  <ellipse cx="120" cy="210" rx="35" ry="45" fill="#2d2d4a"/>
  <ellipse cx="120" cy="210" rx="25" ry="32" fill="#1a1a2e"/>
  <!-- 耳机信号波纹 -->
  <path d="M85,190 Q95,185 100,195" stroke="#ff00ff" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M80,200 Q92,193 100,205" stroke="#ff00ff" stroke-width="2" fill="none" opacity="0.4"/>
  
  <!-- 右耳机 -->
  <ellipse cx="392" cy="210" rx="45" ry="55" fill="#1a1a2e" stroke="url(#headphoneGradient)" stroke-width="4" filter="url(#glow)"/>
  <ellipse cx="392" cy="210" rx="35" ry="45" fill="#2d2d4a"/>
  <ellipse cx="392" cy="210" rx="25" ry="32" fill="#1a1a2e"/>
  <!-- 耳机信号波纹 -->
  <path d="M427,190 Q417,185 412,195" stroke="#ff00ff" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M432,200 Q420,193 412,205" stroke="#ff00ff" stroke-width="2" fill="none" opacity="0.4"/>
  
  <!-- 机器人头部主体 -->
  <ellipse cx="256" cy="260" rx="100" ry="90" fill="url(#robotBody)"/>
  
  <!-- 头部高光 -->
  <ellipse cx="230" cy="210" rx="50" ry="30" fill="rgba(255,255,255,0.15)"/>
  
  <!-- 面板分隔线 -->
  <path d="M170,300 Q256,330 342,300" stroke="#1a1a2e" stroke-width="3" fill="none" opacity="0.3"/>
  
  <!-- 左眼 - 北极星 -->
  <g transform="translate(200, 240)" filter="url(#starGlow)">
    <!-- 五角星 -->
    <polygon points="20,0 25,15 40,15 28,25 33,40 20,30 7,40 12,25 0,15 15,15" 
             fill="url(#starEye)"/>
    <!-- 星芒光芒 -->
    <line x1="20" y1="-8" x2="20" y2="-15" stroke="#ffd700" stroke-width="2"/>
    <line x1="20" y1="48" x2="20" y2="55" stroke="#ffd700" stroke-width="2"/>
    <line x1="-8" y1="20" x2="-15" y2="20" stroke="#ffd700" stroke-width="2"/>
    <line x1="48" y1="20" x2="55" y2="20" stroke="#ffd700" stroke-width="2"/>
    <!-- 对角光芒 -->
    <line x1="-5" y1="-5" x2="-12" y2="-12" stroke="#ffd700" stroke-width="1.5"/>
    <line x1="45" y1="-5" x2="52" y2="-12" stroke="#ffd700" stroke-width="1.5"/>
    <line x1="-5" y1="45" x2="-12" y2="52" stroke="#ffd700" stroke-width="1.5"/>
    <line x1="45" y1="45" x2="52" y2="52" stroke="#ffd700" stroke-width="1.5"/>
  </g>
  
  <!-- 右眼 - 北极星 -->
  <g transform="translate(292, 240)" filter="url(#starGlow)">
    <!-- 五角星 -->
    <polygon points="20,0 25,15 40,15 28,25 33,40 20,30 7,40 12,25 0,15 15,15" 
             fill="url(#starEye)"/>
    <!-- 星芒光芒 -->
    <line x1="20" y1="-8" x2="20" y2="-15" stroke="#ffd700" stroke-width="2"/>
    <line x1="20" y1="48" x2="20" y2="55" stroke="#ffd700" stroke-width="2"/>
    <line x1="-8" y1="20" x2="-15" y2="20" stroke="#ffd700" stroke-width="2"/>
    <line x1="48" y1="20" x2="55" y2="20" stroke="#ffd700" stroke-width="2"/>
    <!-- 对角光芒 -->
    <line x1="-5" y1="-5" x2="-12" y2="-12" stroke="#ffd700" stroke-width="1.5"/>
    <line x1="45" y1="-5" x2="52" y2="-12" stroke="#ffd700" stroke-width="1.5"/>
    <line x1="-5" y1="45" x2="-12" y2="52" stroke="#ffd700" stroke-width="1.5"/>
    <line x1="45" y1="45" x2="52" y2="52" stroke="#ffd700" stroke-width="1.5"/>
  </g>
  
  <!-- 嘴巴 - 自信的微笑 -->
  <path d="M220,320 Q256,345 292,320" stroke="#1a1a2e" stroke-width="5" fill="none" stroke-linecap="round"/>
  
  <!-- 脸颊装饰 -->
  <circle cx="165" cy="280" r="8" fill="#ff69b4" opacity="0.4"/>
  <circle cx="347" cy="280" r="8" fill="#ff69b4" opacity="0.4"/>
  
  <!-- 天线 -->
  <line x1="256" y1="170" x2="256" y2="120" stroke="url(#robotBody)" stroke-width="8" stroke-linecap="round"/>
  <circle cx="256" cy="110" r="15" fill="#00d4ff" filter="url(#strongGlow)"/>
  <circle cx="256" cy="110" r="8" fill="#ffffff"/>
  
  <!-- Glitch效果装饰 -->
  <rect x="180" y="260" width="3" height="15" fill="#ff00ff" opacity="0.5"/>
  <rect x="329" y="250" width="3" height="20" fill="#00ffff" opacity="0.5"/>
  
  <!-- 数据流装饰 -->
  <text x="140" y="380" fill="#00d4ff" font-size="8" font-family="monospace" opacity="0.4">&gt;AI.exe</text>
  <text x="320" y="390" fill="#ff00ff" font-size="8" font-family="monospace" opacity="0.4">v2.0.26</text>
  
  <!-- 能量环 -->
  <ellipse cx="256" cy="260" rx="115" ry="105" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.2" stroke-dasharray="10,5"/>
</svg>