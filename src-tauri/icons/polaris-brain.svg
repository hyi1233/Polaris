<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- 渐变定义 -->
    <linearGradient id="brainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b9d"/>
      <stop offset="50%" style="stop-color:#ff4757"/>
      <stop offset="100%" style="stop-color:#ff6b9d"/>
    </linearGradient>
    
    <linearGradient id="neuralGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff88"/>
      <stop offset="50%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#00ff88"/>
    </linearGradient>
    
    <linearGradient id="lightningGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="50%" style="stop-color:#ffff00"/>
      <stop offset="100%" style="stop-color:#ffd700"/>
    </linearGradient>
    
    <!-- 发光效果 -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="strongGlow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="pulseGlow">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- 背景渐变 -->
    <radialGradient id="bgGradient" cx="50%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:#2a1a4a"/>
      <stop offset="50%" style="stop-color:#1a0a2e"/>
      <stop offset="100%" style="stop-color:#0d0518"/>
    </radialGradient>
  </defs>
  
  <!-- 背景 -->
  <circle cx="256" cy="256" r="250" fill="url(#bgGradient)" stroke="#4a2a6a" stroke-width="3"/>
  
  <!-- 大脑轮廓 -->
  <g transform="translate(256, 280)">
    <!-- 大脑主体 - 半透明 -->
    <path d="M-90,-40 
             Q-100,-80 -80,-110 
             Q-60,-140 -20,-150 
             Q20,-160 60,-140 
             Q100,-120 110,-80 
             Q115,-40 100,0 
             Q90,40 50,60 
             Q0,80 -50,60 
             Q-100,40 -90,-40 Z" 
          fill="rgba(255, 100, 150, 0.3)" 
          stroke="url(#brainGradient)" 
          stroke-width="3"/>
    
    <!-- 左半球大脑纹路 -->
    <path d="M-70,-30 Q-80,-70 -60,-100" stroke="rgba(255,150,180,0.6)" stroke-width="3" fill="none"/>
    <path d="M-50,-20 Q-60,-60 -40,-90" stroke="rgba(255,150,180,0.5)" stroke-width="2" fill="none"/>
    <path d="M-30,-10 Q-40,-50 -20,-80" stroke="rgba(255,150,180,0.4)" stroke-width="2" fill="none"/>
    <path d="M-80,0 Q-90,-30 -70,-60" stroke="rgba(255,150,180,0.5)" stroke-width="2" fill="none"/>
    
    <!-- 右半球大脑纹路 -->
    <path d="M70,-30 Q80,-70 60,-100" stroke="rgba(255,150,180,0.6)" stroke-width="3" fill="none"/>
    <path d="M50,-20 Q60,-60 40,-90" stroke="rgba(255,150,180,0.5)" stroke-width="2" fill="none"/>
    <path d="M30,-10 Q40,-50 20,-80" stroke="rgba(255,150,180,0.4)" stroke-width="2" fill="none"/>
    <path d="M80,0 Q90,-30 70,-60" stroke="rgba(255,150,180,0.5)" stroke-width="2" fill="none"/>
    
    <!-- 中间分隔 -->
    <line x1="0" y1="-140" x2="0" y2="60" stroke="rgba(255,150,180,0.3)" stroke-width="2"/>
  </g>
  
  <!-- 神经网络节点 -->
  <g filter="url(#pulseGlow)">
    <!-- 主要节点 -->
    <circle cx="220" cy="200" r="8" fill="url(#neuralGradient)"/>
    <circle cx="292" cy="200" r="8" fill="url(#neuralGradient)"/>
    <circle cx="256" cy="240" r="10" fill="url(#neuralGradient)"/>
    <circle cx="180" cy="260" r="6" fill="url(#neuralGradient)"/>
    <circle cx="332" cy="260" r="6" fill="url(#neuralGradient)"/>
    <circle cx="256" cy="300" r="7" fill="url(#neuralGradient)"/>
    <circle cx="200" cy="320" r="5" fill="url(#neuralGradient)"/>
    <circle cx="312" cy="320" r="5" fill="url(#neuralGradient)"/>
  </g>
  
  <!-- 神经连接线 -->
  <g stroke="url(#neuralGradient)" stroke-width="2" fill="none" opacity="0.7">
    <line x1="220" y1="200" x2="256" y2="240"/>
    <line x1="292" y1="200" x2="256" y2="240"/>
    <line x1="256" y1="240" x2="256" y2="300"/>
    <line x1="220" y1="200" x2="180" y2="260"/>
    <line x1="292" y1="200" x2="332" y2="260"/>
    <line x1="180" y1="260" x2="200" y2="320"/>
    <line x1="332" y1="260" x2="312" y2="320"/>
    <line x1="256" y1="300" x2="200" y2="320"/>
    <line x1="256" y1="300" x2="312" y2="320"/>
  </g>
  
  <!-- 爆炸式弹出的图标 -->
  <!-- 代码图标 - 左上 -->
  <g transform="translate(100, 120)" filter="url(#glow)">
    <rect x="0" y="0" width="40" height="30" rx="4" fill="#1a0a2e" stroke="#00ff88" stroke-width="2"/>
    <text x="5" y="12" fill="#00ff88" font-size="10" font-family="monospace">&lt;/&gt;</text>
    <line x1="5" y1="20" x2="30" y2="20" stroke="#00d4ff" stroke-width="2"/>
  </g>
  <line x1="140" y1="135" x2="180" y2="170" stroke="#00ff88" stroke-width="1" opacity="0.5"/>
  
  <!-- 聊天气泡 - 右上 -->
  <g transform="translate(370, 100)" filter="url(#glow)">
    <path d="M5,0 L35,0 Q40,0 40,5 L40,22 Q40,27 35,27 L18,27 L14,35 L14,27 L5,27 Q0,27 0,22 L0,5 Q0,0 5,0 Z" 
          fill="#1a0a2e" stroke="#ff00ff" stroke-width="2"/>
    <circle cx="13" cy="13" r="3" fill="#ff00ff"/>
    <circle cx="27" cy="13" r="3" fill="#ff00ff"/>
  </g>
  <line x1="370" y1="127" x2="332" y2="170" stroke="#ff00ff" stroke-width="1" opacity="0.5"/>
  
  <!-- 文件夹图标 - 左 -->
  <g transform="translate(60, 280)" filter="url(#glow)">
    <path d="M0,5 L0,28 Q0,32 4,32 L36,32 Q40,32 40,28 L40,8 Q40,4 36,4 L18,4 L14,0 L4,0 Q0,0 0,4 Z" 
          fill="#1a0a2e" stroke="#ffd700" stroke-width="2"/>
  </g>
  <line x1="100" y1="296" x2="150" y2="290" stroke="#ffd700" stroke-width="1" opacity="0.5"/>
  
  <!-- 齿轮图标 - 右 -->
  <g transform="translate(410, 280)" filter="url(#glow)">
    <circle cx="18" cy="18" r="12" fill="#1a0a2e" stroke="#00d4ff" stroke-width="2"/>
    <circle cx="18" cy="18" r="5" fill="#00d4ff"/>
    <rect x="16" y="0" width="4" height="8" fill="#00d4ff"/>
    <rect x="16" y="28" width="4" height="8" fill="#00d4ff"/>
    <rect x="0" y="16" width="8" height="4" fill="#00d4ff"/>
    <rect x="28" y="16" width="8" height="4" fill="#00d4ff"/>
  </g>
  <line x1="410" y1="298" x2="360" y2="295" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
  
  <!-- 闪电图标 - 顶部中央 -->
  <g transform="translate(236, 60)" filter="url(#strongGlow)">
    <polygon points="20,0 8,22 16,22 10,40 28,18 20,18 28,0" fill="url(#lightningGradient)"/>
  </g>
  <line x1="256" y1="100" x2="256" y2="130" stroke="#ffff00" stroke-width="2" opacity="0.6"/>
  
  <!-- 左闪电 -->
  <g transform="translate(140, 80)" filter="url(#strongGlow)">
    <polygon points="15,0 6,16 12,16 8,30 21,14 15,14 21,0" fill="url(#lightningGradient)" transform="scale(0.8)"/>
  </g>
  <line x1="155" y1="104" x2="190" y2="150" stroke="#ffff00" stroke-width="1.5" opacity="0.5"/>
  
  <!-- 右闪电 -->
  <g transform="translate(340, 80)" filter="url(#strongGlow)">
    <polygon points="15,0 6,16 12,16 8,30 21,14 15,14 21,0" fill="url(#lightningGradient)" transform="scale(0.8)"/>
  </g>
  <line x1="355" y1="104" x2="320" y2="150" stroke="#ffff00" stroke-width="1.5" opacity="0.5"/>
  
  <!-- 溢出的代码流 -->
  <g transform="translate(160, 380)" opacity="0.6">
    <text x="0" y="0" fill="#00ff88" font-size="8" font-family="monospace">import { AI } from 'brain'</text>
    <text x="0" y="12" fill="#00d4ff" font-size="8" font-family="monospace">const thought = await AI</text>
    <text x="0" y="24" fill="#ff00ff" font-size="8" font-family="monospace">process.exit(∞)</text>
  </g>
  
  <!-- 脉冲环 -->
  <circle cx="256" cy="280" r="110" fill="none" stroke="#00ff88" stroke-width="1" opacity="0.15"/>
  <circle cx="256" cy="280" r="130" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.1"/>
  <circle cx="256" cy="280" r="150" fill="none" stroke="#ff00ff" stroke-width="1" opacity="0.05"/>
  
  <!-- Glitch 条纹 -->
  <rect x="200" y="250" width="3" height="20" fill="#00ff88" opacity="0.4"/>
  <rect x="305" y="270" width="3" height="25" fill="#ff00ff" opacity="0.4"/>
  <rect x="230" y="310" width="3" height="15" fill="#00d4ff" opacity="0.3"/>
  
  <!-- 能量粒子 -->
  <circle cx="150" cy="180" r="3" fill="#00ff88" opacity="0.5"/>
  <circle cx="360" cy="170" r="2" fill="#ff00ff" opacity="0.5"/>
  <circle cx="380" cy="340" r="2.5" fill="#00d4ff" opacity="0.4"/>
  <circle cx="130" cy="350" r="2" fill="#ffd700" opacity="0.4"/>
</svg>